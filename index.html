<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Tienda WhatsApp Pro</title>
    <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class='bg-gray-100'>
    <header class='bg-green-600 text-white p-6 shadow-lg sticky top-0 z-50 text-center'>
        <h1 class='text-2xl font-bold'>Tienda WhatsApp Pro</h1>
        <p class='text-sm opacity-90'>Vende online sin comisiones</p>
    </header>

    <main id='app' class='p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6'>
        <div class='text-center col-span-full py-10'>
            <p class='text-gray-500 animate-pulse'>Conectando con el inventario...</p>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz1z7aM_KtUohAOMTs361pGkIptC7DvnF4HOaxzbwKOleaBo_lKVsFxfflQFYgpPUm4/exec";
        
        // Datos por si falla la conexión
        const respaldo = [
            { id: 1, nombre: 'Producto Local 1', precio: 1000, img: 'https://via.placeholder.com/300' },
            { id: 2, nombre: 'Producto Local 2', precio: 2000, img: 'https://via.placeholder.com/300' }
        ];

        async function cargar() {
            try {
                // Intentamos cargar de Google con un tiempo límite
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const res = await fetch(API_URL, { signal: controller.signal });
                const data = await res.json();
                renderizar(data);
            } catch (e) {
                console.warn('Usando datos de respaldo:', e);
                renderizar(respaldo);
            }
        }

        function renderizar(items) {
            const app = document.getElementById('app');
            app.innerHTML = '';
            items.forEach(p => {
                const div = document.createElement('div');
                div.className = 'bg-white rounded-xl shadow-md overflow-hidden p-4';
                div.innerHTML = ;
                app.appendChild(div);
            });
        }

        function pedir(n, p) {
            window.open('https://wa.me/5491122334455?text=' + encodeURIComponent('Hola! Me interesa: ' + n));
        }

        cargar();
    </script>
</body>
</html>
