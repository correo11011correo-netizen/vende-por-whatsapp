<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Tienda WhatsApp Pro - Admin</title>
    <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class='bg-slate-900 text-white min-h-screen flex flex-col'>
    
    <header class='bg-green-600 p-4 shadow-xl text-center sticky top-0 z-50'>
        <h1 class='text-xl font-bold tracking-widest'>MI TIENDA WHATSAPP PRO</h1>
        <div id='header-status' class='inline-block px-3 py-1 bg-green-800 rounded-full text-[10px] mt-1'>ONLINE</div>
    </header>

    <main id='app' class='flex-grow p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 overflow-y-auto pb-32'>
        <!-- Los productos aparecerán aquí -->
    </main>

    <!-- PANEL DE ADMINISTRACIÓN (Formulario) -->
    <div id='admin-panel' class='fixed bottom-0 right-0 m-6 w-full max-w-sm bg-zinc-800 p-6 rounded-2xl border-t-4 border-green-500 shadow-2xl transition-transform translate-y-full' style='z-index: 1000;'>
        <h2 class='text-lg font-bold text-green-400 mb-4 uppercase tracking-tighter'>Cargar Nuevo Producto</h2>
        <div class='space-y-3'>
            <input id='nombre' class='w-full bg-zinc-900 p-3 rounded border border-zinc-700 text-sm' placeholder='Nombre del producto'>
            <input id='precio' type='number' class='w-full bg-zinc-900 p-3 rounded border border-zinc-700 text-sm' placeholder='Precio ($)'>
            <input id='img' class='w-full bg-zinc-900 p-3 rounded border border-zinc-700 text-sm' placeholder='URL de la imagen'>
            <button onclick="cargarNuevo()" class='w-full bg-green-600 py-3 rounded font-bold uppercase hover:bg-green-500'>Cargar Producto</button>
            <button onclick="toggleAdmin()" class='w-full text-xs text-zinc-500 hover:underline'>Cerrar</button>
        </div>
    </div>

    <!-- BOTÓN FLOTANTE (+) -->
    <button onclick="toggleAdmin()" class='fixed bottom-28 right-6 bg-green-500 w-14 h-14 rounded-full flex items-center justify-center text-3xl font-bold shadow-2xl hover:scale-110 transition-transform z-50'>+</button>

    <footer class='bg-black h-24 border-t border-zinc-800 p-4 overflow-y-auto text-[9px] font-mono opacity-50 sticky bottom-0'>
        <div id='log-panel'>--- Terminal de Estado ---</div>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyi4iuMkqdQ5GrY2ODzkjDYumosOJUhJHzD3fGS_PMW1K9RNv5YXKbIPbMrfaud-qiGyA/exec";
        
        function addLog(m) {
            const time = new Date().toLocaleTimeString();
            document.getElementById('log-panel').prepend(document.createElement('div').innerHTML = );
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('translate-y-full');
        }

        async function init() {
            addLog('Iniciando carga...');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                render(data);
                addLog('Catálogo cargado ✅');
            } catch (e) {
                addLog('Error al cargar del servidor. Usando respaldo.');
                render([{nombre: 'Ejemplo 1', precio: 1000}]);
            }
        }

        async function cargarNuevo() {
            const payload = {
                nombre: document.getElementById('nombre').value,
                precio: document.getElementById('precio').value,
                img: document.getElementById('img').value || 'https://via.placeholder.com/300'
            };

            addLog();
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                addLog('Producto guardado en Google ✅');
                toggleAdmin();
                init(); // Recargar catálogo
            } catch (e) {
                addLog('Error al guardar. Verifica permisos.');
            }
        }

        function render(data) {
            const app = document.getElementById('app');
            app.innerHTML = '';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-zinc-800 rounded-xl p-4 border border-zinc-700 shadow-lg";
                card.innerHTML = ;
                app.appendChild(card);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
