<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Catálogo Pro - WhatsApp</title>
    <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class='bg-gray-100'>
    <header class='bg-green-600 text-white p-6 shadow-lg sticky top-0 z-50'>
        <h1 class='text-2xl font-bold text-center'>Tienda WhatsApp Pro</h1>
        <p class='text-center text-sm'>Vende online sin pagar comisiones</p>
    </header>

    <main id='app' class='p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6'>
        <div class='text-center col-span-full py-10'>
            <p class='text-gray-500 animate-pulse'>Sincronizando con Google Apps Script...</p>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz1z7aM_KtUohAOMTs361pGkIptC7DvnF4HOaxzbwKOleaBo_lKVsFxfflQFYgpPUm4/exec";

        async function cargar() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const app = document.getElementById('app');
                app.innerHTML = '';
                data.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-xl shadow-md overflow-hidden';
                    card.innerHTML = ;
                    app.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('app').innerHTML = '<p class="text-center col-span-full">Error al cargar datos.</p>';
            }
        }

        function pedir(n, p) {
            const num = '5491122334455';
            const msg = encodeURIComponent("Hola! Quiero comprar: " + n + " por $" + p);
            window.open("https://wa.me/" + num + "?text=" + msg);
        }

        cargar();
    </script>
</body>
</html>
